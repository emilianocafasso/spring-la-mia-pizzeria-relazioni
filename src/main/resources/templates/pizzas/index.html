<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container mt-4">
        <h1 class="mb-4">Tutte le Pizze</h1>

        <!-- Se la lista è vuota, mostriamo un messaggio -->
        <div th:if="${pizzas.isEmpty()}" class="alert alert-warning">
            Non ci sono ancora pizze nel menu. Aggiungine una!
        </div>

        <!-- Altrimenti mostriamo la tabella -->
        <table th:unless="${pizzas.isEmpty()}" class="table table-striped table-hover">
            <thead class="table-danger">
                <tr>
                    <th>ID</th>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Prezzo</th>
                </tr>
            </thead>
            <tbody>
                <!-- th:each itera sulla lista, come un forEach -->
                <tr th:each="pizza : ${pizzas}">
                    <td th:text="${pizza.id}"></td>
                    <td>
                        <img th:src="${pizza.photo}" th:alt="${pizza.name}"
                            style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    </td>
                    <td th:text="${pizza.name}"></td>
                    <td th:text="${pizza.description}"></td>
                    <td th:text="${'€ ' + pizza.price}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
