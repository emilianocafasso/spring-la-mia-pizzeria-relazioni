<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container mt-4">
        <h1 class="mb-4">Tutte le Pizze</h1>

        <div class="mb-3 d-flex">
            <a th:href="@{/pizzas/create}" class="me-auto btn btn-primary btn-sm">Crea nuova Pizza</a>
        </div>

        <!-- Se la lista è vuota, mostriamo un messaggio -->
        <div th:if="${pizzas.isEmpty()}" class="alert alert-warning">
            Non ci sono ancora pizze nel menu. Aggiungine una!
        </div>

        <!-- Altrimenti mostriamo la tabella -->
        <table th:unless="${pizzas.isEmpty()}" class="table table-striped table-hover">
            <thead class="table-danger">
                <tr>
                    <th>ID</th>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Ingredienti</th>
                    <th>Prezzo</th>
                    <th>Azioni</th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- th:each itera sulla lista, come un forEach -->
                <tr th:each="pizza : ${pizzas}" th:object="${pizza}">
                    <td th:text="*{id}"></td>
                    <td>
                        <img th:src="*{photo}" th:alt="*{name}"
                            style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    </td>
                    <td th:text="*{name}"></td>
                    <td>
                        <div>
                            <span th:each="ingredient, iter : ${pizza.ingredients}">
                                <span th:text="${ingredient.name}"></span>
                                <span th:if="${!iter.last}">, </span>
                            </span>
                        </div>
                    </td>
                    <td th:text="${'€ ' + pizza.price}"></td>
                    <td>
                        <!-- @{...} costruisce url dinamici in Thymeleaf -->
                        <!-- (id=&{pizza.id}) sostituisce {id} nell'url -->
                        <a th:href="@{/pizzas/{id}(id=${pizza.id})}" class="btn btn-primary btn-sm">
                            Dettagli
                        </a>
                    </td>
                    <td>
                        <a th:href="@{/pizzas/edit/{id}(id=${pizza.id})}" class="btn btn-success btn-sm">Modifica</a>
                    </td>
                    <td>
                        <!-- & form senza modale, con semplice "bottone" -->
                        <!-- <form action="#" th:action="@{/pizzas/delete/{id}(id=${pizza.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>  -->



                        <!-- form con modale -->
                        <!-- # A: bottone che fa partire la modale -->
                        <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
                            th:data-bs-target="'#delete-modal-' + ${pizza.id}"
                            onclick="console.log('Bottone premuto!')">
                            Elimina
                        </button>

                        <div class="modal fade" th:id="'delete-modal-' + ${pizza.id}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">

                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5">Elimino [[${pizza.name}]]</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Chiudi"></button>
                                    </div>

                                    <div class="modal-body">
                                        Sicuro di volere eliminare la Pizza <strong>"[[${pizza.name}]]"</strong>?
                                    </div>

                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Chiudi</button>

                                        <form class="d-inline-block" th:action="@{/pizzas/delete/{id}(id=${pizza.id})}"
                                            method="post">
                                            <button type="submit" class="btn btn-danger">Elimina
                                                definitivamente</button>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{fragments/footer}"></div>
</body>

</html>
