<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}">
    <title>Pizza Book</title>
</head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="fw-bold mb-3">Modifica pizza: [[${pizza.name}]]</h1>
                <div class="row justify-content-center">
                    <div class="col-8">

                        <form id="pizza-form" th:action="@{/pizzas/edit/{id}(id=${pizza.id})}" th:object="${pizza}"
                            method="post">

                            <div class="mb-3">
                                <label class="form-label" for="name">Nome:</label>
                                <input class="form-input" type="text" id="title" th:field="*{name}"
                                    th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('name')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="description">Descrizione:</label>
                                <textarea class="form-input" type="text" id="description" th:field="*{description}"
                                    th:errorClass="is-invalid"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('description')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="photo">Foto:</label>
                                <input class="form-input" type="text" id="photo" th:field="*{photo}"
                                    th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('photo')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('photo')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="price">Prezzo:</label>
                                <input class="form-input" type="number" step="0.01" id="price" th:field="*{price}"
                                    th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('price')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3 d-flex justify-content-between">
                                <input type="submit" class="btn btn-primary" value="Update Pizza">
                                <input type="reset" class="btn btn-warning" value="Reset all fields">
                            </div>

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
