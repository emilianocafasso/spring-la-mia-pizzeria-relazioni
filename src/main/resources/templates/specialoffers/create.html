<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}">
    <title>Create Offer</title>
</head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <main class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="fw-bold mb-3">Creazione Offerta</h1>
                <div class="row justify-content-center">
                    <div class="col-8">

                        <form id="pizza-form" th:action="@{/specialoffers/create}" th:object="${offer}" method="post">

                            <input type="hidden" th:field="*{pizza}">

                            <div class="mb-3">
                                <label class="form-label" for="name">Titolo</label>
                                <input class="form-input" type="text" id="title" th:field="*{title}"
                                    th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('title')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div>
                                <label class="form-label" for="startDate">Data di inizio:</label>
                                <input type="date" class="form-input" id="startDate" th:field="*{startDate}"
                                    th:errorClass="is-invalid"></input>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('startDate')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div>
                                <label class="form-label" for="endDate">Data di fine:</label>
                                <input type="date" class="form-input" id="endDate" th:field="*{endDate}"
                                    th:errorClass="is-invalid"></input>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('endDate')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>
                    </div>

                    <div class="mb-3 d-flex justify-content-between">
                        <input type="submit" class="btn btn-primary" value="Aggiung offerta">
                        <input type="reset" class="btn btn-warning" value="Reset">
                    </div>

                    </form>
                </div>
            </div>
        </div>
        </div>
    </main>
</body>

</html>
