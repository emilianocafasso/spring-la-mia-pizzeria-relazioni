<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <div class="container mt-4">
        <h1 class="mb-4">Ingredienti</h1>

        <div class="mb-3 d-flex">
            <a th:href="@{/ingredients/create}" class="me-auto btn btn-primary btn-sm">Crea nuovo Ingrediente</a>
        </div>

        <!--! Se la lista è vuota, mostriamo un messaggio -->
        <div th:if="${ingredients.isEmpty()}" class="alert alert-warning">
            Non ci sono ancora Ingredienti. Aggiungine uno!
        </div>

        <!-- Form creazione -->
        <form th:action="@{/ingredients/create}" th:object="${newIngredient}" method="post" class="d-flex gap-2 mb-4">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Nome ingrediente" required>
            <button type="submit" class="btn btn-success">Aggiungi</button>
        </form>

        <!-- Lista ingredienti -->
        <ul class="list-group">
            <li th:each="ingredient : ${ingredients}"
                class="list-group-item d-flex justify-content-between align-items-center">
                <span th:text="${ingredient.name}"></span>
                <form th:action="@{/ingredients/delete/{id}(id=${ingredient.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">Elimina</button>
                </form>
            </li>
        </ul>


    </div>
    <div th:replace="~{fragments/footer}"></div>
</body>

</html>
